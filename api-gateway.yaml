spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: 'user-service'
          uri: lb://USER-SERVICE
          predicates:
            path: '/users/*'
        - id: 'order-service'
          uri: lb://ORDER_SERVICE
          predicates:
            path: '/order/*'
  config:
    import: optional:configserver:http://localhost:8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka 

server:
  port: 8080
